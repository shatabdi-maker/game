<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Puzzle Game</title>
<link rel="stylesheet" href="style.css">
</head>


<body>

<canvas id="confettiCanvas"></canvas>

<h1>⬡ Puzzle Game</h1>

<div class="hud">
  <div class="hud-item">
    <div class="hud-label">Coins</div>
    <div class="hud-value gold" id="coins">50</div>
  </div>
  <div class="hud-item">
    <div class="hud-label">Level</div>
    <div class="hud-value" id="level">1</div>
  </div>
  <div class="hud-item">
    <div class="hud-label">Timer</div>
    <div class="hud-value pink" id="timer">0</div>
  </div>
</div>

<div class="countdown-wrap">
  <div class="countdown-track">
    <div class="countdown-fill" id="countdownFill" style="width:100%;background:var(--accent)"></div>
  </div>
  <div class="countdown-info">
    <span>⏱ Auto-shuffle in</span>
    <span id="countdownSec">--</span>
    <span>seconds</span>
  </div>
</div>

<div class="level-progress">
  <div class="progress-track">
    <div class="progress-fill" id="progressFill" style="width:4%"></div>
  </div>
  <div class="progress-label">
    <span>Level 1</span>
    <span id="progressText">1 / 25</span>
    <span>Level 25</span>
  </div>
</div>

<div id="grid"></div>

<div class="buttons">
  <button onclick="initGame()">↺ Restart</button>
  <button class="btn-spin" onclick="spinGrid()">⟳ Spin (10🪙)</button>
</div>

<p id="message"></p>

<!-- Celebration overlay -->
<div id="celebration" class="hidden">
  <canvas id="confettiCanvas2" style="position:fixed;inset:0;pointer-events:none;z-index:99;"></canvas>
  <div class="celebration-box">
    <div class="celebration-title" id="celebTitle">Level Complete!</div>
    <div class="celebration-sub" id="celebSub">Get ready for the next level...</div>
  </div>
</div>

<!-- Game Over overlay -->
<div id="gameover" class="hidden">
  <div class="gameover-box">
    <div class="gameover-title">🏆 You Win!</div>
    <div class="gameover-sub">You completed all 25 levels!<br>Total time: <span id="totalTimeDisplay">0</span>s</div>
    <button onclick="resetGame()">▶ Play Again</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
