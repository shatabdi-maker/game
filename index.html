<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Puzzle Game</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background: linear-gradient(  rgba(0,0,0,0.5),   /* এখানে 0.5 মানে 50% opacity */ rgba(0,0,0,0.5)),
    url("images/55f7e80ea7879536217305ac0112ed19.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
   
    color:white;
    text-align:center;

    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    flex-direction:column;
}

h1{ margin-top:20px; }

.top-bar{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-top:10px;
    font-weight:bold;
}

.grid{
    display:grid;
    grid-template-columns:repeat(7,50px);
    grid-template-rows:repeat(7,50px);
    gap:5px;
    transition:transform 0.5s;
    margin-top:30px;
    
}

.tile{
    background:#5aba9b;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
    cursor:pointer;
    border-radius:8px;
    user-select:none;
}

.tile.empty{
    background:#2b2b40;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;
    margin-top: 15px;
}

.spin-btn{ background:#f6c23e; }
.restart-btn{ background:#e74a3b; }
.next-btn{ background:#1cc88a; }

#message{
    margin-top:10px;
    font-size:18px;
}
    /* Mobile screens <= 576px */
/* Mobile screens <= 576px */
@media (max-width: 576px){
    .grid{
        display:grid;
    grid-template-columns:repeat(5,40px);
    grid-template-rows:repeat(5,40px); /* 5 columns on mobile */
    }
}
</style>
</head>

<body>

<h1>Advanced Puzzle Game</h1>

<div class="top-bar">
    <div>Coins: <span id="coins">0</span></div>
    <div>Level: <span id="level">1</span></div>
    <div>Time: <span id="timer">0</span>s</div>
</div>

<div class="grid" id="grid"></div>

<div>
    <button class="spin-btn" onclick="spinGrid()">Spin (-10)</button>
    <button class="restart-btn" onclick="initGame()">Restart</button>
</div>

<h3 id="message"></h3>

<audio id="winSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>

const gridElement = document.getElementById("grid");
const coinsElement = document.getElementById("coins");
const levelElement = document.getElementById("level");
const timerElement = document.getElementById("timer");
const messageElement = document.getElementById("message");
const winSound = document.getElementById("winSound");

let tiles = [];
let selectedTile = null;
let coins = localStorage.getItem("coins") ? parseInt(localStorage.getItem("coins")) : 50;
let level = 1;
let timer = 0;
let timerInterval;

function initGame(){
     tiles = [];

for(let i = 1; i <= 49; i++){
    tiles.push(i);
}

tiles.push(""); // empty
    shuffle(tiles, level * 5);
    selectedTile = null;
    timer = 0;
    clearInterval(timerInterval);
    timerInterval = setInterval(()=>{
        timer++;
        timerElement.textContent = timer;
    },1000);

    updateUI();
    renderGrid();
    messageElement.textContent="";
}

function shuffle(array, times){
    for(let i=0;i<times;i++){
        let a = Math.floor(Math.random()*array.length);
        let b = Math.floor(Math.random()*array.length);
        [array[a],array[b]]=[array[b],array[a]];
    }
}

function renderGrid(){
    gridElement.innerHTML="";
    tiles.forEach((value,index)=>{
        const tile=document.createElement("div");
        tile.classList.add("tile");
        if(value==="") tile.classList.add("empty");
        tile.textContent=value;
        tile.onclick=()=>selectTile(index);
        gridElement.appendChild(tile);
    });
}

function selectTile(index){
    if(selectedTile===null){
        selectedTile=index;
    }else{
        [tiles[selectedTile],tiles[index]]=[tiles[index],tiles[selectedTile]];
        selectedTile=null;
        renderGrid();
        checkWin();
    }
}
function checkWin(){
    for(let i=0;i<49;i++){
        if(tiles[i] !== i+1) return;
    }

    if(tiles[49] === ""){
        clearInterval(timerInterval);
        coins += 20 + (level*5);
        level++;
        winSound.play();
        messageElement.textContent="🎉 Level Complete!";
        localStorage.setItem("coins", coins);
        updateUI();
        setTimeout(initGame,2000);
    }
}

function spinGrid(){
    if(coins<10){
        alert("Not enough coins!");
        return;
    }
    coins-=10;
    localStorage.setItem("coins", coins);
    updateUI();

    gridElement.style.transform="rotate(360deg)";
    setTimeout(()=>{
        gridElement.style.transform="rotate(0deg)";
        shuffle(tiles,5);
        renderGrid();
    },500);
}

function updateUI(){
    coinsElement.textContent=coins;
    levelElement.textContent=level;
    timerElement.textContent=timer;
}

initGame();
</script>

</body>
</html>
